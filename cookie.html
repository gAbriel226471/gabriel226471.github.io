<!DOCTYPE html>
<html>
<head>
  <title>Cookie Clicker</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      margin-top: 50px;
      background: #f7e9c8;
    }
    #cookie {
      width: 200px;
      cursor: pointer;
      transition: 0.1s;
    }
    #cookie:active {
      transform: scale(0.9);
    }
    #stats {
      margin-top: 20px;
      font-size: 22px;
    }
    button {
      padding: 10px 20px;
      margin-top: 20px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      background: #d4a373;
      color: white;
      transition: 0.2s;
    }
    button:hover {
      background: #b5835a;
    }
  </style>
</head>
<body>

<h1>Cookie Clicker</h1>

<img id="cookie" src="https://i.imgur.com/3ZQ3Z4F.png" alt="cookie">

<div id="stats">
  Cookies: <span id="count">0</span><br>
  Auto Clickers: <span id="auto">0</span>
</div>

<button onclick="buyAuto()">Buy Auto Clicker (Cost: <span id='cost'>50</span>)</button>

<script>
  let cookies = 0;
  let autoClickers = 0;
  let autoCost = 50;

  const cookie = document.getElementById("cookie");
  const count = document.getElementById("count");
  const auto = document.getElementById("auto");
  const cost = document.getElementById("cost");

  // Click cookie
  cookie.onclick = function() {
    cookies++;
    count.textContent = cookies;
  };

  // Buy auto clicker
  function buyAuto() {
    if (cookies >= autoCost) {
      cookies -= autoCost;
      autoClickers++;
      autoCost = Math.floor(autoCost * 1.5);

      count.textContent = cookies;
      auto.textContent = autoClickers;
      cost.textContent = autoCost;
    }
  }

  // Auto cookie generator
  setInterval(() => {
    cookies += autoClickers;
    count.textContent = cookies;
  }, 1000);
</script>

</body>
</html>
