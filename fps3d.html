<!DOCTYPE html>
<html>
<head>
  <title>3D FPS Demo</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: #000;
      color: white;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
    }
    #start {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="ui">3D FPS Demo – WASD to move, mouse to look, click to shoot</div>
<button id="start">Click to start</button>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/controls/PointerLockControls.js"></script>

<script>
  let scene, camera, renderer, controls;
  let objects = [];
  let raycaster = new THREE.Raycaster();
  let mouse = new THREE.Vector2();
  let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
  let velocity = new THREE.Vector3();
  let prevTime = performance.now();

  const startButton = document.getElementById('start');
  startButton.addEventListener('click', () => {
    controls.lock();
  });

  init();
  animate();

  function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x202030);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Lights
    const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
    light.position.set(0, 200, 0);
    scene.add(light);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight.position.set(50, 100, -50);
    scene.add(dirLight);

    // Floor
    const floorGeo = new THREE.PlaneGeometry(1000, 1000);
    const floorMat = new THREE.MeshPhongMaterial({ color: 0x303030 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // Boxes (targets)
    const boxGeo = new THREE.BoxGeometry(10, 10, 10);
    const boxMat = new THREE.MeshPhongMaterial({ color: 0xff4444 });
    for (let i = 0; i < 20; i++) {
      const box = new THREE.Mesh(boxGeo, boxMat.clone());
      box.position.set(
        (Math.random() - 0.5) * 200,
        5,
        (Math.random() - 0.5) * 200
      );
      scene.add(box);
      objects.push(box);
    }

    // Controls
    controls = new THREE.PointerLockControls(camera, document.body);
    controls.getObject().position.set(0, 10, 50);
    scene.add(controls.getObject());

    controls.addEventListener('lock', () => {
      startButton.style.display = 'none';
    });

    controls.addEventListener('unlock', () => {
      startButton.style.display = 'block';
    });

    // Keyboard
    const onKeyDown = (event) => {
      switch (event.code) {
        case 'KeyW': moveForward = true; break;
        case 'KeyS': moveBackward = true; break;
        case 'KeyA': moveLeft = true; break;
        case 'KeyD': moveRight = true; break;
      }
    };

    const onKeyUp = (event) => {
      switch (event.code) {
        case 'KeyW': moveForward = false; break;
        case 'KeyS': moveBackward = false; break;
        case 'KeyA': moveLeft = false; break;
        case 'KeyD': moveRight = false; break;
      }
    };

    document.addEventListener('keydown', onKeyDown);
    document.addEventListener('keyup', onKeyUp);

    // Shooting
    document.addEventListener('click', () => {
      if (!controls.isLocked) return;

      raycaster.setFromCamera({ x: 0, y: 0 }, camera); // center of screen
      const hits = raycaster.intersectObjects(objects, false);
      if (hits.length > 0) {
        const hit = hits[0].object;
        scene.remove(hit);
        objects = objects.filter(o => o !== hit);
      }
    });

    window.addEventListener('resize', onWindowResize);
  }

  function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }

  function animate() {
    requestAnimationFrame(animate);

    const time = performance.now();
    const delta = (time - prevTime) / 1000;

    if (controls.isLocked) {
      velocity.x -= velocity.x * 10.0 * delta;
      velocity.z -= velocity.z * 10.0 * delta;

      const speed = 80.0;

      if (moveForward) velocity.z -= speed * delta;
      if (moveBackward) velocity.z += speed * delta;
      if (moveLeft) velocity.x -= speed * delta;
      if (moveRight) velocity.x += speed * delta;

      controls.moveRight(velocity.x * delta);
      controls.moveForward(velocity.z * delta);
    }

    prevTime = time;

    renderer.render(scene, camera);
  }
</script>

</body>
</html>
