<!DOCTYPE html>
<html>
<head>
  <title>3D Siege Defense</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #1a1a1a;
      font-family: Arial;
      color: white;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      font-size: 20px;
    }
  </style>
</head>
<body>

<div id="ui">Score: <span id="score">0</span></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let catapult, stones = [], enemies = [];
let score = 0;

const scoreEl = document.getElementById("score");

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 2000);
  camera.position.set(0, 50, 200);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(100, 200, 100);
  scene.add(light);

  const groundGeo = new THREE.PlaneGeometry(2000, 2000);
  const groundMat = new THREE.MeshPhongMaterial({ color: 0x228B22 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);

  const castleGeo = new THREE.BoxGeometry(80, 40, 80);
  const castleMat = new THREE.MeshPhongMaterial({ color: 0x555555 });
  const castle = new THREE.Mesh(castleGeo, castleMat);
  castle.position.set(0, 20, 0);
  scene.add(castle);

  const catapultGeo = new THREE.BoxGeometry(20, 10, 20);
  const catapultMat = new THREE.MeshPhongMaterial({ color: 0x8b4513 });
  catapult = new THREE.Mesh(catapultGeo, catapultMat);
  catapult.position.set(0, 10, 60);
  scene.add(catapult);

  window.addEventListener("mousemove", onMouseMove);
  window.addEventListener("click", fireStone);

  setInterval(spawnEnemy, 1500);
}

function onMouseMove(e) {
  const x = (e.clientX / window.innerWidth) * 2 - 1;
  catapult.rotation.y = -x * 1.5;
}

function fireStone() {
  const stoneGeo = new THREE.SphereGeometry(5, 16, 16);
  const stoneMat = new THREE.MeshPhongMaterial({ color: 0xaaaaaa });
  const stone = new THREE.Mesh(stoneGeo, stoneMat);

  stone.position.copy(catapult.position);
  stone.rotation.copy(catapult.rotation);

  const dir = new THREE.Vector3(0, 0, -1).applyEuler(catapult.rotation);
  stone.velocity = dir.multiplyScalar(4);

  stones.push(stone);
  scene.add(stone);
}

function spawnEnemy() {
  const enemyGeo = new THREE.BoxGeometry(10, 20, 10);
  const enemyMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
  const enemy = new THREE.Mesh(enemyGeo, enemyMat);

  enemy.position.set((Math.random() - 0.5) * 300, 10, -400);
  enemy.speed = 0.5 + Math.random() * 0.5;

  enemies.push(enemy);
  scene.add(enemy);
}

function animate() {
  requestAnimationFrame(animate);

  stones.forEach((s, i) => {
    s.position.add(s.velocity);
    if (s.position.length() > 1000) {
      scene.remove(s);
      stones.splice(i, 1);
    }
  });

  enemies.forEach((e, i) => {
    e.position.z += e.speed;

    if (e.position.z > 40) {
      alert("Your castle has fallen! Refresh to play again.");
      enemies = [];
    }

    stones.forEach((s, si) => {
      if (s.position.distanceTo(e.position) < 15) {
        scene.remove(e);
        scene.remove(s);
        enemies.splice(i, 1);
        stones.splice(si, 1);
        score++;
        scoreEl.textContent = score;
      }
    });
  });

  renderer.render(scene, camera);
}
</script>

</body>
</html>
